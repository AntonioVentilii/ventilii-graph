<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				try {
					var t = localStorage.getItem('theme');
					var dark =
						t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
					document.documentElement.classList.toggle('light', !dark);
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%

		<title>Antonio Ventilii — portfolio</title>

		<!-- Font preloads -->
		<link
			rel="preload"
			href="/fonts/jetbrainsmono-regular.woff2"
			as="font"
			type="font/woff"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/jetbrainsmono-bold.woff2"
			as="font"
			type="font/woff"
			crossorigin
		/>
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-page text-fg antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
