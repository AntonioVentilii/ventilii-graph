<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				try {
					var t = localStorage.getItem('theme');
					var dark =
						t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
					document.documentElement.classList.toggle('light', !dark);
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />
		<link
			rel="icon"
			type="image/png"
			href="%sveltekit.assets%/favicons/favicon-96x96.png"
			sizes="96x96"
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicons/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/favicons/apple-touch-icon.png"
		/>
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Antonio Ventilii — Senior Software Engineer (TypeScript, Rust, Python). View my portfolio of Web3 and traditional finance projects."
		/>
		<meta property="og:title" content="Antonio Ventilii — Senior Software Engineer" />
		<meta
			property="og:description"
			content="Full-stack development, Web3, and desk automation. Exploring the intersection of finance and technology."
		/>
		<meta property="og:image" content="%sveltekit.assets%/favicons/web-app-manifest-512x512.png" />
		<meta property="og:type" content="website" />
		%sveltekit.head%

		<title>Antonio Ventilii — portfolio</title>

		<!-- Font preloads -->
		<link
			rel="preload"
			href="/fonts/jetbrainsmono-regular.woff2"
			as="font"
			type="font/woff"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/jetbrainsmono-bold.woff2"
			as="font"
			type="font/woff"
			crossorigin
		/>
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-page text-fg antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
